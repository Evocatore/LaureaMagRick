<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheda Personaggio - Epic Fantasy</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap');

    :root {
      --gold: #d4b16a;
      --gold-light: #f0d8a2;
      --bronze: #8f6a33;
      --bg: #0d0b09;
      --panel: #16120f;
      --panel2: #211912;
      --text: #ece5d8;
      --muted: #bcae97;
      --red: #8d2c2c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px;
      background:
        radial-gradient(circle at top, #322214 0%, transparent 45%),
        radial-gradient(circle at bottom, #1b1410 0%, transparent 45%),
        linear-gradient(#0b0908, #17120d);
      font-family: "Cormorant Garamond", serif;
      color: var(--text);
    }

    .toolbar {
      text-align: center;
      margin-bottom: 25px;
    }

    button {
      background: linear-gradient(#b89557, #81602f);
      color: white;
      border: none;
      padding: 14px 26px;
      font-family: Cinzel;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 0 18px rgba(255, 214, 120, .35);
      transition: .25s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 28px rgba(255, 214, 120, .55);
    }

    .card {
      width: 210mm;
      min-height: 297mm;
      margin: auto;

      background:
        radial-gradient(circle at top, rgba(255, 215, 120, .07), transparent 35%),
        radial-gradient(circle at bottom, rgba(255, 170, 70, .05), transparent 40%),
        linear-gradient(180deg, #1c1712, #12100d);

      border: 2px solid var(--gold);

      box-shadow:
        0 0 0 4px #3d2d1a,
        0 0 60px rgba(0, 0, 0, .8),
        inset 0 0 80px rgba(255, 208, 120, .05);

      padding: 24px;
      position: relative;
    }

    .card:before,
    .card:after {
      content: "✦";
      position: absolute;
      color: rgba(255, 214, 140, .18);
      font-size: 90px;
    }

    .card:before {
      top: 10px;
      left: 20px;
    }

    .card:after {
      bottom: 10px;
      right: 20px;
    }

    .title {
      text-align: center;
      font-family: Cinzel;
      font-size: 36px;
      color: var(--gold-light);
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-shadow: 0 0 18px rgba(255, 220, 150, .25);
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 18px;
    }

    .panel {
      background:
        linear-gradient(180deg, #211912, #17120f);
      border: 1px solid rgba(212, 177, 106, .35);
      padding: 15px;
      border-radius: 10px;
      box-shadow: inset 0 0 25px rgba(0, 0, 0, .35);
    }

    .panel h3 {
      margin: 0 0 10px;
      font-family: Cinzel;
      color: var(--gold);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--gold-light);
      font-family: Cinzel;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      background: #0d0b09;
      border: 1px solid #6d552d;
      color: white;
      padding: 7px;
      border-radius: 6px;
      font-family: inherit;
    }

    .image-box {
      height: 300px;
      border: 2px dashed rgba(212, 177, 106, .45);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8d7d63;
      background:
        repeating-linear-gradient(45deg,
          rgba(255, 255, 255, .02),
          rgba(255, 255, 255, .02) 12px,
          rgba(0, 0, 0, .03) 12px,
          rgba(0, 0, 0, .03) 24px);
      font-size: 22px;
      text-align: center;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      background: #0d0b09;
      border: 1px solid #6d552d;
      color: white;
      border-radius: 8px;
      padding: 10px;
      font-family: inherit;
    }

    .stats {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .stat {
      background: #18130f;
      border: 1px solid rgba(212, 177, 106, .4);
      border-radius: 10px;
      text-align: center;
      padding: 10px;
    }

    .stat h4 {
      margin: 0 0 10px;
      color: var(--gold);
      font-family: Cinzel;
      font-size: 14px;
    }

    .stat input {
      width: 100%;
      text-align: center;
      margin-bottom: 6px;
    }

    .small-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .small-box {
      background: #18130f;
      border: 1px solid rgba(212, 177, 106, .4);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .small-box label {
      display: block;
      font-family: Cinzel;
      color: var(--gold);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .checkbox {
      transform: scale(1.5);
    }

    .traits {
      margin-top: 18px;
    }

    .trait {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 10px;
      margin-bottom: 8px;
    }

    .trait input {
      width: 100%;
    }

    .footer {
      margin-top: 25px;
      text-align: center;
      font-size: 12px;
      color: #8c7b62;
      font-style: italic;
    }

    input,
    textarea {
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--gold-light);
      box-shadow: 0 0 12px rgba(255, 214, 120, .2);
    }

    @media print {

      body {
        background: white;
        padding: 0;
      }

      .toolbar {
        display: none;
      }

      .card {
        margin: 0;
        width: 210mm;
        min-height: 297mm;
        box-shadow: none;
        page-break-after: avoid;
      }

      @page {
        size: A4 portrait;
        margin: 8mm;
      }

    }
  </style>
</head>

<body>

  <div class="toolbar">
    <button onclick="window.print()">
      🖨 Esporta / Salva come PDF
    </button>
  </div>

  <div class="card">

    <div class="title">
      IL PERSONAGGIO
    </div>

    <div class="grid">

      <!-- <div>

        <div class="panel">
          <h3>Ritratto</h3>

          <div class="image-box">
            AREA IMMAGINE<br><br>
            (incolla uno screenshot in stampa oppure sostituisci questo riquadro con un'immagine)
          </div>

        </div>

      </div> -->

      <div>

        <div class="panel">
          <h3>Informazioni</h3>

          <div class="info-grid">

            <div class="field">
              <label>Nome</label>
              <input placeholder="Nome del personaggio" value="Rick">
            </div>

            <div class="field">
              <label>Razza</label>
              <input placeholder="Razza" value="Nano">
            </div>

            <div class="field">
              <label>Classe</label>
              <input placeholder="Classe" value="Guerriero">
            </div>

            <div class="field">
              <label>Allineamento</label>
              <input placeholder="Allineamento" value="Legale/Buono">
            </div>

            <div class="field">
              <label>Altezza</label>
              <input placeholder="Altezza" value="1.79 cm">
            </div>

            <div class="field">
              <label>Velocità</label>
              <input placeholder="Velocità" value="7.5 m">
            </div>

          </div>

        </div>

        <div class="stats">

          <div class="stat">
            <h4>FOR</h4>
            <input value="15">
            <input value="+2">
          </div>

          <div class="stat">
            <h4>DES</h4>
            <input value="16">
            <input value="+3">
          </div>

          <div class="stat">
            <h4>COS</h4>
            <input value="14">
            <input value="+2">
          </div>

          <div class="stat">
            <h4>INT</h4>
            <input value="10">
            <input value="+0">
          </div>

          <div class="stat">
            <h4>SAG</h4>
            <input value="12">
            <input value="+1">
          </div>

          <div class="stat">
            <h4>CAR</h4>
            <input value="18">
            <input value="+4">
          </div>

        </div>

        <div class="small-grid">

          <div class="small-box">
            <label>Iniziativa</label>
            <input value="+3">
          </div>

          <div class="small-box">
            <label>Bonus Competenza</label>
            <input value="+2">
          </div>

          <div class="small-box">
            <label>Ispirazione</label>
            <input class="checkbox" type="checkbox">
          </div>

          <div class="small-box">
            <label>Note</label>
            <input placeholder="...">
          </div>

        </div>

        <div class="panel traits">
          <h3>Tratti e Privilegi</h3>

          <div class="trait">
            <input placeholder="Tratto">
            <input placeholder="Descrizione">
          </div>

          <div class="trait">
            <input placeholder="Tratto">
            <input placeholder="Descrizione">
          </div>

          <div class="trait">
            <input placeholder="Tratto">
            <input placeholder="Descrizione">
          </div>

          <div class="trait">
            <input placeholder="Tratto">
            <input placeholder="Descrizione">
          </div>

          <div class="trait">
            <input placeholder="Tratto">
            <input placeholder="Descrizione">
          </div>

          <div class="trait">
            <input placeholder="Tratto">
            <input placeholder="Descrizione">
          </div>

        </div>

        <div class="panel" style="margin-top:18px;">
          <h3>Background</h3>
          <textarea placeholder="Scrivi qui la storia del personaggio..."></textarea>
        </div>

      </div>

      <div>

        <div class="panel">
          <h3>Ritratto</h3>

          <div class="image-box">
            AREA IMMAGINE<br><br>
            (incolla uno screenshot in stampa oppure sostituisci questo riquadro con un'immagine)
          </div>

        </div>

      </div>

    </div>

    <div class="footer">
      ❖ Forgiato nelle tenebre • Degno degli eroi • Degno della leggenda ❖
    </div>

  </div>

</body>

</html>
